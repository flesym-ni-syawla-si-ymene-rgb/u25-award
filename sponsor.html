<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>協賛お問い合わせ | U25 AI×3D PERSPECTIVE AWARD 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #111; --gray: #666; --light: #999;
      --border: #e0e0e0; --bg: #fafaf8; --white: #fff;
      --accent: #2a5a3f; --error: #c0392b;
    }
    body {
      background: var(--bg); color: var(--black);
      font-family: 'Noto Sans JP', sans-serif;
      -webkit-font-smoothing: antialiased; line-height: 1.8;
      min-height: 100vh;
    }
    .en { font-family: 'Inter', sans-serif; }
    nav {
      padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.15em; color: var(--black); text-decoration: none; text-transform: uppercase; }
    .nav-back { font-size: 13px; color: var(--gray); text-decoration: none; letter-spacing: 0.06em; }
    .nav-back:hover { color: var(--black); }
    main { max-width: 600px; margin: 0 auto; padding: 64px 24px 120px; }
    h1 { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: 0.1em; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: var(--gray); letter-spacing: 0.06em; margin-bottom: 48px; }
    .form-group { margin-bottom: 28px; }
    label {
      display: block; font-size: 13px; font-weight: 500;
      letter-spacing: 0.06em; margin-bottom: 8px; color: var(--black);
    }
    label .required { font-size: 10px; color: var(--error); margin-left: 4px; font-weight: 600; letter-spacing: 0.1em; }
    .form-input {
      width: 100%; padding: 12px 16px;
      background: var(--white); border: 1px solid var(--border);
      font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
      letter-spacing: 0.04em; color: var(--black);
      outline: none; transition: border-color 0.3s;
    }
    .form-input:focus { border-color: var(--black); }
    .form-input::placeholder { color: #bbb; }
    textarea.form-input { resize: vertical; min-height: 120px; }
    select.form-input {
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23999' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 16px center;
      padding-right: 40px;
    }
    .form-note { font-size: 12px; color: var(--light); margin-top: 4px; letter-spacing: 0.04em; }
    .btn-submit {
      display: block; width: 100%; padding: 16px;
      background: var(--black); color: var(--white);
      font-family: 'Inter', sans-serif; font-weight: 600;
      font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
      border: none; cursor: pointer; transition: all 0.3s;
    }
    .btn-submit:hover { background: var(--accent); }
    .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; }
    .divider { height: 1px; background: var(--border); margin: 48px 0; }

    /* Info box */
    .info-box {
      background: var(--white); border: 1px solid var(--border);
      padding: 24px; margin-bottom: 48px;
    }
    .info-box h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .info-box p { font-size: 13px; color: var(--gray); line-height: 1.9; }

    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      main { padding: 40px 20px 80px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">U25 AI×3D Award</a>
  <a href="index.html" class="nav-back">← サイトに戻る</a>
</nav>

<main>
  <p class="en" style="font-size:11px; font-weight:600; letter-spacing:0.3em; color:var(--light); text-transform:uppercase; margin-bottom:16px;">Sponsorship Inquiry</p>
  <h1>協賛お問い合わせ</h1>
  <p class="subtitle">U25 AI×3D PERSPECTIVE AWARD 2026 への協賛・パートナーシップに関するお問い合わせフォームです。</p>

  <div class="info-box">
    <h3>協賛のメリット</h3>
    <p>
      ・公式サイト・パンフレット・SNSへのロゴ掲載<br>
      ・最終審査会でのブース出展<br>
      ・詳細はお問い合わせ後にご案内いたします
    </p>
  </div>

  <iframe name="gasFrame" style="display:none;"></iframe>
  <form id="sponsorForm" method="POST" target="gasFrame"
    action="https://script.google.com/macros/s/AKfycbxHprKmI--5_VqBSVDHX4cOS3aL4ZymGJbzHwv-luhNSIxFkuLUE3WdCOFtgSP9MT78hQ/exec"
    onsubmit="setTimeout(function(){window.location.href='thanks.html?type=sponsor'},1500)">
    <input type="hidden" name="sheet" value="協賛お問い合わせ">
    <input type="hidden" name="redirect" value="">

    <div class="form-group">
      <label>企業名<span class="required">必須</span></label>
      <input type="text" class="form-input" name="col1" placeholder="株式会社○○" required>
    </div>

    <div class="form-group">
      <label>ご担当者名<span class="required">必須</span></label>
      <input type="text" class="form-input" name="col2" placeholder="山田 太郎" required>
    </div>

    <div class="form-group">
      <label>メールアドレス<span class="required">必須</span></label>
      <input type="email" class="form-input" name="col3" placeholder="example@company.com" required>
    </div>

    <div class="form-group">
      <label>電話番号</label>
      <input type="tel" class="form-input" name="col4" placeholder="03-1234-5678">
    </div>

    <div class="form-group">
      <label>メッセージ</label>
      <textarea class="form-input" name="col5" placeholder="ご質問、ご要望、協賛の背景など自由にご記入ください"></textarea>
    </div>

    <div class="divider"></div>

    <button type="submit" class="btn-submit">Send Inquiry</button>
    <p style="font-size:12px; color:var(--light); text-align:center; margin-top:16px; letter-spacing:0.04em;">
      送信いただいた情報は<a href="privacy.html" target="_blank" style="color:var(--gray);">プライバシーポリシー</a>に基づき取り扱います
    </p>
  </form>

</body>
</html>
