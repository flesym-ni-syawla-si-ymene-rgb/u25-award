<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENTRY | U25 AI×3D PERSPECTIVE AWARD 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #111; --gray: #666; --light: #999;
      --border: #e0e0e0; --bg: #fafaf8; --white: #fff;
      --accent: #2a5a3f; --error: #c0392b;
    }
    body {
      background: var(--bg); color: var(--black);
      font-family: 'Noto Sans JP', sans-serif;
      -webkit-font-smoothing: antialiased; line-height: 1.8;
      min-height: 100vh;
    }
    .en { font-family: 'Inter', sans-serif; }

    /* Nav */
    nav {
      padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.15em; color: var(--black); text-decoration: none; text-transform: uppercase; }
    .nav-back { font-size: 13px; color: var(--gray); text-decoration: none; letter-spacing: 0.06em; }
    .nav-back:hover { color: var(--black); }

    /* Main */
    main { max-width: 600px; margin: 0 auto; padding: 64px 24px 120px; }
    h1 { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: 0.1em; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: var(--gray); letter-spacing: 0.06em; margin-bottom: 48px; }

    /* Form */
    .form-group { margin-bottom: 28px; }
    label {
      display: block; font-size: 13px; font-weight: 500;
      letter-spacing: 0.06em; margin-bottom: 8px; color: var(--black);
    }
    label .required {
      font-size: 10px; color: var(--error); margin-left: 4px;
      font-weight: 600; letter-spacing: 0.1em;
    }
    .form-input {
      width: 100%; padding: 12px 16px;
      background: var(--white); border: 1px solid var(--border);
      font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
      letter-spacing: 0.04em; color: var(--black);
      outline: none; transition: border-color 0.3s;
    }
    .form-input:focus { border-color: var(--black); }
    .form-input::placeholder { color: #bbb; }
    .form-input.error { border-color: var(--error); }
    textarea.form-input { resize: vertical; min-height: 100px; }
    select.form-input {
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23999' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 16px center;
      padding-right: 40px;
    }
    .error-msg { color: var(--error); font-size: 12px; margin-top: 4px; display: none; }
    .form-note { font-size: 12px; color: var(--light); margin-top: 4px; letter-spacing: 0.04em; }

    /* Checkbox */
    .checkbox-wrap { display: flex; align-items: flex-start; gap: 10px; }
    .checkbox-wrap input[type="checkbox"] {
      appearance: none; width: 18px; height: 18px;
      border: 1px solid var(--border); background: var(--white);
      cursor: pointer; flex-shrink: 0; margin-top: 2px;
      position: relative; transition: all 0.2s;
    }
    .checkbox-wrap input:checked { background: var(--black); border-color: var(--black); }
    .checkbox-wrap input:checked::after {
      content: ''; position: absolute; top: 2px; left: 5px;
      width: 5px; height: 9px; border: solid var(--white);
      border-width: 0 2px 2px 0; transform: rotate(45deg);
    }
    .checkbox-wrap label { font-size: 13px; color: var(--gray); margin-bottom: 0; }

    /* Submit */
    .btn-submit {
      display: block; width: 100%; padding: 16px;
      background: var(--black); color: var(--white);
      font-family: 'Inter', sans-serif; font-weight: 600;
      font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
      border: none; cursor: pointer; transition: all 0.3s;
    }
    .btn-submit:hover { background: var(--accent); }
    .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 48px 0; }

    /* Responsive */
    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      main { padding: 40px 20px 80px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">U25 AI×3D Award</a>
  <a href="index.html" class="nav-back">← サイトに戻る</a>
</nav>

<main>
  <p class="en" style="font-size:11px; font-weight:600; letter-spacing:0.3em; color:var(--light); text-transform:uppercase; margin-bottom:16px;">Entry Form</p>
  <h1>エントリー</h1>
  <p class="subtitle">U25 AI×3D PERSPECTIVE AWARD 2026 への応募フォームです。</p>

  <iframe name="gasFrame" style="display:none;"></iframe>
  <form id="entryForm"
    method="POST" target="gasFrame"
    action="https://script.google.com/macros/s/AKfycbxHprKmI--5_VqBSVDHX4cOS3aL4ZymGJbzHwv-luhNSIxFkuLUE3WdCOFtgSP9MT78hQ/exec"
    onsubmit="setTimeout(function(){window.location.href='thanks.html'},1500)">
    <input type="hidden" name="sheet" value="エントリー">
    <input type="hidden" name="redirect" value="">

    <div class="form-group">
      <label>氏名<span class="required">必須</span></label>
      <input type="text" class="form-input" name="col1" placeholder="山田 太郎" required>
    </div>

    <div class="form-group">
      <label>メールアドレス<span class="required">必須</span></label>
      <input type="email" class="form-input" name="col2" placeholder="example@email.com" required>
    </div>

    <div class="form-group">
      <label>年齢<span class="required">必須</span></label>
      <select class="form-input" name="col3" required>
        <option value="">選択してください</option>
        <option>15歳</option><option>16歳</option><option>17歳</option>
        <option>18歳</option><option>19歳</option><option>20歳</option>
        <option>21歳</option><option>22歳</option><option>23歳</option>
        <option>24歳</option><option>25歳</option>
      </select>
    </div>

    <div class="form-group">
      <label>所属（学校名 or 勤務先）</label>
      <input type="text" class="form-input" name="col4" placeholder="○○大学 / フリーランス / 株式会社○○ など">
      <p class="form-note">未記入でも応募可能です</p>
    </div>

    <div class="form-group">
      <label>使用予定のツール<span class="required">必須</span></label>
      <input type="text" class="form-input" name="col5" placeholder="SketchUp, Blender, Midjourney, Stable Diffusion など" required>
    </div>

    <div class="form-group">
      <label>ポートフォリオURL</label>
      <input type="text" class="form-input" name="col6" placeholder="https://...">
      <p class="form-note">Behance, note, 個人サイトなど</p>
    </div>

    <div class="form-group">
      <label>備考・質問</label>
      <textarea class="form-input" name="col7" placeholder="チームでの応募、質問など自由にご記入ください"></textarea>
    </div>

    <div class="divider"></div>

    <div class="form-group">
      <div class="checkbox-wrap">
        <input type="checkbox" id="agree" required>
        <label for="agree"><a href="terms.html" target="_blank" style="color:var(--black);">応募規約</a>および<a href="privacy.html" target="_blank" style="color:var(--black);">プライバシーポリシー</a>に同意する</label>
      </div>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">Submit Entry</button>
    <p id="submitStatus" style="text-align:center; margin-top:16px; font-size:13px; color:var(--gray); display:none;"></p>
  </form>

</main>

</body>
</html>
